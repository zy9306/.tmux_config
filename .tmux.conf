# 重新加载：tmux source ~/.tmux.conf
# Linux 下 tmux-yank 需要 xsel 或 xclip

# 支持 Ctrl+Shift+h/j/k/l 穿透 tmux
set -g extended-keys always
set -s extended-keys always

# xterm 兼容终端使用扩展按键
set -as terminal-features ',xterm*:extkeys'
set -g extended-keys-format csi-u

# imgcat 需要控制序列透传
set-option -g allow-passthrough on

set-environment -g PATH "$HOME/.local/share/mise/shims:$HOME/.local/bin:$HOME/.npm_packages/bin:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$HOME/.local/share/mise/installs/tmux/3.6a:/Applications/kitty.app/Contents/MacOS"

set-option -g default-shell "/bin/zsh"
set-option -g default-command ""

set -g set-titles on

# 鼠标选择复制到系统剪贴板
set -g @yank_with_mouse on
set -g @yank_selection_mouse 'clipboard'
# 复制后退出 copy-mode
set -g @yank_action 'copy-pipe-and-cancel'
run-shell ~/.tmux_config/plugins/tmux-yank/yank.tmux

set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'  # 分钟
set -g @resurrect-dir '~/.tmux/resurrect'

set -g status-interval 60  # 秒

set -g status-left-length 50
set -g status-right-length 50
set -g status-right "#H %H:%M"

set -g monitor-activity on
set -g visual-activity on

set -g mouse on

set -g pane-border-format '#{s|^#{HOME}/|~/|:pane_title}'
set -g pane-border-status top
# prefix+q 面板编号显示时长
set -g display-panes-time 7000

set -g default-terminal "tmux-256color"

# 窗口从 1 开始编号
set -g base-index 1
set -g renumber-windows on

set -g automatic-rename on
set -g allow-rename off
set-option -g automatic-rename-format '#{?#{m/r:^@,#{window_name}},#{window_name},#{b:pane_current_path}}'
set-hook -g after-rename-window 'if -F "#{m/r:^@,#{window_name}}" "set-window-option automatic-rename off" "set-window-option automatic-rename on"'

# prefix 改为 C-x
set -g prefix C-x
unbind C-b
bind C-x send-prefix
set -g repeat-time 5000

bind v swap-pane -s '!'

bind -r Space select-layout -n
bind -r H select-layout even-horizontal
bind -r V select-layout even-vertical

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# vi 复制模式
set -g mode-keys vi
bind C-l select-window -l

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# 调整面板大小
bind-key -r M-k resize-pane -U 5
bind-key -r M-j resize-pane -D 5
bind-key -r M-h resize-pane -L 5
bind-key -r M-l resize-pane -R 5

bind-key -r C-Up resize-pane -U
bind-key -r C-Down resize-pane -D
bind-key -r C-Left resize-pane -L
bind-key -r C-Right resize-pane -R

# 主题
set -g @catppuccin_flavor "latte"
set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"

run-shell ~/.tmux_config/plugins/catppuccin/catppuccin.tmux

# 先加载 resurrect，再加载 continuum
run-shell ~/.tmux_config/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux_config/plugins/tmux-continuum/continuum.tmux

# smart-splits：vim 内发送按键，shell 内切换面板
bind-key h if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-x h' 'select-pane -L'
bind-key j if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-x j' 'select-pane -D'
bind-key k if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-x k' 'select-pane -U'
bind-key l if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-x l' 'select-pane -R'

bind-key -n 'C-S-H' if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-S-H' 'select-pane -L'
bind-key -n 'C-S-J' if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-S-J' 'select-pane -D'
bind-key -n 'C-S-K' if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-S-K' 'select-pane -U'
bind-key -n 'C-S-L' if -F '#{&&:#{@pane-is-vim},#{m/r:(^|/)(n?vim|g?vim|view)(diff)?$,#{pane_current_command}}}' 'send-keys C-S-L' 'select-pane -R'

bind-key -T copy-mode-vi 'C-S-H' select-pane -L
bind-key -T copy-mode-vi 'C-S-J' select-pane -D
bind-key -T copy-mode-vi 'C-S-K' select-pane -U
bind-key -T copy-mode-vi 'C-S-L' select-pane -R

# - tmux source ~/.tmux.conf
# - tmux-yank need xsel or xclip in linux

# fix iTerm2 ctrl+shift+<key> not working
# Enable extended keys support
set -g extended-keys on
set -s extended-keys on

# Tell tmux your terminal supports extended keys and use CSI u format
# set -as terminal-features 'xterm*:extkeys'
# set -g extended-keys-format csi-u


set-environment -g PATH "/usr/local/bin:/bin:/usr/bin:$HOME/.local/share/mise/installs/tmux/3.6a"

set-option -g default-command "/bin/zsh"

set -g set-titles on

run-shell ~/.tmux_config/plugins/tmux-yank/yank.tmux
run-shell ~/.tmux_config/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux_config/plugins/tmux-continuum/continuum.tmux

# Linux 需要 xsel 或 xclip, MacOS 需要 reattach-to-user-namespace
# Linux 剪切板有 primary, secondary, clipboard, tmux-yank 默认的是
# clipboard，而鼠标选择默认是 primary，这里改成 clipboard 以支持鼠标选
# 中自动复制到 clipboard
set -g @yank_with_mouse on
set -g @yank_selection_mouse 'clipboard'
# 鼠标选择复制后不退出 copy-mode, 默认为 copy-pipe-and-cancel
set -g @yank_action 'copy-pipe'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'  # minute

set -g status-interval 60  # second

set -g status-left-length 50
set -g status-right-length 50
set -g status-right "#H %H:%M"

set -g monitor-activity on
set -g visual-activity on

set -g mouse on

set -g pane-border-format "#{pane_index} #{pane_title}"
set -g pane-border-status top
# prefix+q time
set -g display-panes-time 7000

set -g default-terminal "tmux-256color"

# Start numbering at 1
set -g base-index 1
set -g renumber-windows on

set -g automatic-rename off
set -g allow-rename off

# Change the prefix key
set -g prefix C-x
unbind C-b
bind C-x send-prefix

bind v swap-pane -s '!' -t $TMUX_PANE

# vi mode use space to enter visual mode
set -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-l select-window -l

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# layout，mac 需改设置终端option 为 meta
bind-key M-1 select-layout even-horizontal
bind-key M-2 select-layout even-vertical
bind-key M-3 select-layout main-horizontal
bind-key M-4 select-layout main-vertical
bind-key M-5 select-layout tiled

# resize
bind-key -r M-k resize-pane -U 5
bind-key -r M-j resize-pane -D 5
bind-key -r M-h resize-pane -L 5
bind-key -r M-l resize-pane -R 5

bind-key -r C-Up resize-pane -U
bind-key -r C-Down resize-pane -D
bind-key -r C-Left resize-pane -L
bind-key -r C-Right resize-pane -R

# theme START
set -g @catppuccin_window_current_text "#{window_name}"
set -g @catppuccin_window_text "#{window_name}"

run-shell ~/.tmux_config/plugins/catppuccin/catppuccin.tmux
# theme END

# https://github.com/mrjones2014/smart-splits.nvim
bind-key -n 'C-S-H' if -F '#{@pane-is-vim}' 'send-keys C-S-H' 'select-pane -L'
bind-key -n 'C-S-J' if -F '#{@pane-is-vim}' 'send-keys C-S-J' 'select-pane -D'
bind-key -n 'C-S-K' if -F '#{@pane-is-vim}' 'send-keys C-S-K' 'select-pane -U'
bind-key -n 'C-S-L' if -F '#{@pane-is-vim}' 'send-keys C-S-L' 'select-pane -R'

bind-key -T copy-mode-vi 'C-S-H' select-pane -L
bind-key -T copy-mode-vi 'C-S-J' select-pane -D
bind-key -T copy-mode-vi 'C-S-K' select-pane -U
bind-key -T copy-mode-vi 'C-S-L' select-pane -R
